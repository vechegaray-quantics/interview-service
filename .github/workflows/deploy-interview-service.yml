name: Deploy interview-service

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "alembic/**"
      - "Dockerfile"
      - "requirements.txt"
      - "alembic.ini"
      - "pytest.ini"
      - "infra/environments/dev/**"
      - ".github/workflows/deploy-interview-service.yml"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      TF_DIR: infra/environments/dev

      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_PREFIX: ${{ vars.TF_STATE_PREFIX }}
      GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
      SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE }}
      CLOUD_SQL_INSTANCE_CONNECTION_NAME: ${{ vars.CLOUD_SQL_INSTANCE_CONNECTION_NAME }}
      DB_NAME: ${{ vars.DB_NAME }}
      DB_USER: ${{ vars.DB_USER }}
      IMAGE_URI: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/${{ vars.CLOUD_RUN_SERVICE }}:${{ github.sha }}

      APP_ENV: ci
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/postgres
      INTERNAL_SERVICE_TOKEN: ${{ secrets.INTERNAL_SERVICE_TOKEN }}
      CAMPAIGN_SERVICE_BASE_URL: ${{ vars.CAMPAIGN_SERVICE_BASE_URL }}
      INVITATION_SERVICE_BASE_URL: ${{ vars.INVITATION_SERVICE_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run local migrations for CI database
        run: alembic upgrade head

      - name: Run tests
        run: pytest -q

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build Docker image
        run: docker build -t "${IMAGE_URI}" .

      - name: Push Docker image
        run: docker push "${IMAGE_URI}"

      - name: Install Cloud SQL Auth Proxy
        run: |
          curl -Lo cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.21.1/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

      - name: Run cloud migrations
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          ./cloud-sql-proxy --port 5434 "${CLOUD_SQL_INSTANCE_CONNECTION_NAME}" > proxy.log 2>&1 &
          sleep 5
          export DATABASE_URL="postgresql+psycopg://${DB_USER}:${DB_PASSWORD}@127.0.0.1:5434/${DB_NAME}"
          alembic upgrade head

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=${TF_STATE_PREFIX}"

      - name: Terraform validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ vars.GCP_REGION }}
          TF_VAR_service_name: ${{ vars.CLOUD_RUN_SERVICE }}
          TF_VAR_artifact_registry_repository: ${{ vars.GAR_REPOSITORY }}
          TF_VAR_cloud_sql_instance_connection_name: ${{ vars.CLOUD_SQL_INSTANCE_CONNECTION_NAME }}
          TF_VAR_database_url: ${{ secrets.DATABASE_URL_CLOUDRUN }}
          TF_VAR_internal_service_token: ${{ secrets.INTERNAL_SERVICE_TOKEN }}
          TF_VAR_campaign_service_base_url: ${{ vars.CAMPAIGN_SERVICE_BASE_URL }}
          TF_VAR_invitation_service_base_url: ${{ vars.INVITATION_SERVICE_BASE_URL }}
          TF_VAR_container_image_tag: ${{ github.sha }}
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ vars.GCP_REGION }}
          TF_VAR_service_name: ${{ vars.CLOUD_RUN_SERVICE }}
          TF_VAR_artifact_registry_repository: ${{ vars.GAR_REPOSITORY }}
          TF_VAR_cloud_sql_instance_connection_name: ${{ vars.CLOUD_SQL_INSTANCE_CONNECTION_NAME }}
          TF_VAR_database_url: ${{ secrets.DATABASE_URL_CLOUDRUN }}
          TF_VAR_internal_service_token: ${{ secrets.INTERNAL_SERVICE_TOKEN }}
          TF_VAR_campaign_service_base_url: ${{ vars.CAMPAIGN_SERVICE_BASE_URL }}
          TF_VAR_invitation_service_base_url: ${{ vars.INVITATION_SERVICE_BASE_URL }}
          TF_VAR_container_image_tag: ${{ github.sha }}
        run: terraform apply -input=false -auto-approve tfplan

      - name: Show deployed URL
        working-directory: ${{ env.TF_DIR }}
        run: terraform output -raw interview_service_url